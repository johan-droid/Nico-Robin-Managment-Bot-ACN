name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: robin
          POSTGRES_PASSWORD: password
          POSTGRES_DB: robin_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U robin -d robin_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      BOT_TOKEN: test-token
      WEBHOOK_URL: https://example.test
      WEBHOOK_SECRET: ci-secret
      DATABASE_URL: postgresql://robin:password@localhost:5432/robin_test
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/1
      CELERY_RESULT_BACKEND: redis://localhost:6379/2
      MODERATION_PROVIDER: traditional_ml
      AI_MODERATION_ENABLED: "true"
      DATA_ENCRYPTION_KEY: YWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWE=
      ENVIRONMENT: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            backend/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('backend/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check formatting
        working-directory: backend
        run: cargo fmt --all -- --check

      - name: Run Clippy linter
        working-directory: backend
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Build
        working-directory: backend
        run: cargo build --verbose

      - name: Run tests
        working-directory: backend
        run: cargo test --verbose
