services:
  - type: worker
    name: nico-robin-bot
    runtime: docker
    plan: starter
    branch: main
    rootDir: /
    dockerfilePath: Dockerfile
    dockerBuildFlags: --no-cache
    autoDeployTrigger: checksPass
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: BOT_MODE
        value: polling
      - key: DATABASE_URL
        fromDatabase:
          name: nico-robin-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: nico-robin-redis
          property: connectionString
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: ALLOWED_GROUP_IDS
        sync: false

  - type: redis
    name: nico-robin-redis
    plan: starter
    ipAllowList: []
    maxmemoryPolicy: allkeys-lru

databases:
  - name: nico-robin-db
    plan: starter
    databaseName: robin_db
    user: robin
