services:
  - type: web
    name: nico-robin-bot
    runtime: docker
    plan: starter
    branch: main
    rootDir: backend
    dockerfilePath: Dockerfile
    dockerBuildFlags: --no-cache
    healthCheckPath: /health
    autoDeployTrigger: checksPass
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: WEBHOOK_URL
        sync: false
      - key: BOT_MODE
        value: webhook
      - key: WEBHOOK_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: nico-robin-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: nico-robin-redis
          property: connectionString
      - key: DATA_ENCRYPTION_KEY
        sync: false
      - key: ENVIRONMENT
        value: production

  - type: redis
    name: nico-robin-redis
    plan: starter
    ipAllowList: []
    maxmemoryPolicy: allkeys-lru

databases:
  - name: nico-robin-db
    plan: starter
    databaseName: robin_db
    user: robin
